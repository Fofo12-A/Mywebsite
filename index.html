<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microsoft Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background"></div>

  <div class="login-container small-box">
    <img
      class="logo"
      src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"
      alt="Microsoft"
    />

    <h1>Se connecter</h1>

    <input
      type="text"
      placeholder="E-mail, téléphone ou identifiant Skype"
    />

    <p class="link-text">
      Vous n'avez pas encore de compte ?
      <a href="#">Créez-en un !</a>
    </p>

    <a href="#" class="account-link">Votre compte n’est pas accessible ?</a>

    <div class="button-area">
      <button>Suivant</button>
    </div>
  </div>

  <div class="options-box">
    <span class="key-icon">🔑</span>
    <span>Options de connexion</span>
  </div>

  <footer>
    <a href="#">Conditions d’utilisation</a>
    <a href="#">Confidentialité et cookies</a>
    <a href="#">Accessibilité : partiellement conforme</a>
  </footer>
</body>
</html>
