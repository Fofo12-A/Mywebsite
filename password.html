<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microsoft Password</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background"></div>

  <div class="login-container password-box">
    <div class="top-row">
      <span class="back-arrow">←</span>

      <img
        class="logo center-logo"
        src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"
        alt="Microsoft"
      />
    </div>

    <div class="email-pill">example@gmail.com</div>

    <h1>Entrez votre mot de passe</h1>

    <div class="password-wrapper">
      <input type="password" placeholder="Mot de passe" />
      <span class="eye">👁️</span>
    </div>

    <button class="full-button">Suivant</button>

    <a href="#" class="bottom-link">Autres méthodes pour se connecter</a>
  </div>

  <footer class="footer-bottom">
    <a href="#">Aide et commentaires</a>
    <a href="#">Conditions d’utilisation</a>
    <a href="#">Confidentialité et cookies</a>
  </footer>
</body>
</html>
