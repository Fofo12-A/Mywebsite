<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrer le mot de passe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- تم التأكد من بقاء كل العناصر داخل هذا الصندوق الأبيض الأساسي -->
        <div class="login-box">
            
            <!-- الهيدر ويحتوي على شعار مايكروسوفت وسهم العودة بجانبه -->
            
                <a href="index.html" class="btn-back" aria-label="Retour">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="#1b1b1b"/>
                    </svg>
                </a>
                <div class="logo">
                    <div class="ms-logo">
                        <span class="red"></span><span class="green"></span>
                        <span class="blue"></span><span class="yellow"></span>
                    </div>
                    <span class="brand-name">Microsoft</span>
                </div>
            </div>

            <!-- عرض البريد الإلكتروني المكتوب في الصفحة الأولى -->
            <div class="user-display">
                <span id="display-email"></span>
            </div>

            <h2>Entrer le mot de passe</h2>

            <!-- نموذج إدخال كلمة السر والأزرار داخل الصندوق تماماً -->
            <form id="form-password">
                <div class="input-group">
                    <input type="password" id="password" placeholder="Mot de passe" required autocomplete="off">
                </div>
                <p class="text-link"><a href="#">Mot de passe oublié ?</a></p>
                <p class="text-link"><a href="#">Se connecter d'une autre manière</a></p>
                
                <div class="button-group">
                    <button type="submit" class="btn-primary">Se connecter</button>
                </div>
            </form>

        </div> <!-- إغلاق الصندوق الأبيض هنا يضمن عدم خروج أي عنصر لأسفل الصفحة -->
    </div>

    <!-- تذييل الصفحة يبقى دائماً في أسفل الشاشة بالكامل -->
    <footer>
        <a href="#">Conditions d'utilisation</a>
        <a href="#">Confidentialité et cookies</a>
        <a href="#">...</a>
    </footer>

    <script>
        // كود برمجى لجلب وعرض البريد تلقائياً وتركيز المؤشر
        document.addEventListener('DOMContentLoaded', function() {
            const savedEmail = localStorage.getItem('user_email') || 'ayoub123@gmail.com';
            document.getElementById('display-email').textContent = savedEmail;
            document.getElementById('password').focus();
        });

        // التعامل مع إرسال كلمة السر
        document.getElementById('form-password').addEventListener('submit', function(e) {
            e.preventDefault();
            const passwordValue = document.getElementById('password').value;
            alert('Mot de passe saisi avec succès : ' + passwordValue);
        });
    </script>
</body>
</html>
