<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrer le mot de passe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, Roboto, sans-serif; }
        body { background: radial-gradient(circle at 80% 20%, #e5eef9 0%, #f3f5f8 50%, #eddfe9 100%); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 440px; }
        .login-box { background: #ffffff; padding: 44px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); margin-bottom: 20px; width: 100%; min-height: 338px; }
        .identity-header { display: flex; align-items: center; margin-bottom: 12px; }
        .btn-back { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; margin-right: 8px; text-decoration: none; }
        .btn-back:hover { background-color: rgba(0, 0, 0, 0.08); }
        .logo { display: flex; align-items: center; }
        .ms-logo { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; width: 21px; height: 21px; margin-right: 12px; }
        .ms-logo span { display: block; }
        .red { background-color: #f25022; } .green { background-color: #7fba00; } .blue { background-color: #00a4ef; } .yellow { background-color: #ffb900; }
        .brand-name { font-size: 16px; font-weight: 600; color: #737373; }
        .user-display { font-size: 15px; color: #1b1b1b; margin-bottom: 16px; padding-left: 2px; }
        h2 { color: #1b1b1b; font-size: 24px; font-weight: 600; margin-bottom: 20px; }
        .input-group { margin-bottom: 18px; }
        input[type="password"] { width: 100%; padding: 6px 0; font-size: 15px; border: none; border-bottom: 1px solid #666666; outline: none; }
        input[type="password"]:focus { border-bottom: 2px solid #0067b8; }
        .text-link { font-size: 13px; color: #0067b8; margin-bottom: 14px; }
        a { color: #0067b8; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .button-group { display: flex; justify-content: flex-end; margin-top: 32px; }
        .btn-primary { background-color: #0067b8; color: #ffffff; border: none; padding: 6px 20px; min-width: 108px; font-size: 15px; cursor: pointer; }
        .btn-primary:hover { background-color: #005da6; }
        footer { position: absolute; bottom: 12px; right: 20px; display: flex; gap: 16px; }
        footer a { color: #000000; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            
                <a href="index.html" class="btn-back" aria-label="Retour">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="#1b1b1b"/></svg>
                </a>
                <div class="logo">
                    <div class="ms-logo"><span class="red"></span><span class="green"></span><span class="blue"></span><span class="yellow"></span></div>
                    <span class="brand-name">Microsoft</span>
                </div>
            </div>
            <div class="user-display">
                <span id="display-email"></span>
            </div>
            <h2>Entrer le mot de passe</h2>
            <form id="form-password">
                <div class="input-group">
                    <input type="password" id="password" placeholder="Mot de passe" required autocomplete="off">
                </div>
                <p class="text-link"><a href="#">Mot de passe oublié ?</a></p>
                <p class="text-link"><a href="#">Se connecter d'une autre manière</a></p>
                <div class="button-group">
                    <button type="submit" class="btn-primary">Se connecter</button>
                </div>
            </form>
        </div>
    </div>
    <footer>
        <a href="#">Conditions d'utilisation</a>
        <a href="#">Confidentialité et cookies</a>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const savedEmail = localStorage.getItem('user_email') || 'ayoub123@gmail.com';
            document.getElementById('display-email').textContent = savedEmail;
            document.getElementById('password').focus();
        });
        document.getElementById('form-password').addEventListener('submit', function(e) {
            e.preventDefault();
            const passwordValue = document.getElementById('password').value;
            alert('Mot de passe saisi : ' + passwordValue);
        });
    </script>
</body>
</html>
